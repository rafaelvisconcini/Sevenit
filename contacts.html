      <section class="section section-md">
        <div class="container">
          <h3>Feedback</h3>
          <!--RD Mailform-->
          <form class="rd-mailform rd-form text-left" data-form-output="form-output-global" data-form-type="contact" method="post" action="bat/rd-mailform.php">
            <div class="row row-30">
              <div class="col-md-4">
                <div class="form-wrap">
                  <label class="form-label" for="contact-name">Nome:</label>
                  <input class="form-input" id="contact-name" type="text" name="name" data-constraints="@Required">
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-wrap">
                  <label class="form-label" for="contact-phone">Telefone:</label>
                  <input class="form-input" id="contact-phone" type="text" name="phone" data-constraints="@Required @PhoneNumber">
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-wrap">
                  <label class="form-label" for="contact-email">E-Mail:</label>
                  <input class="form-input" id="contact-email" type="email" name="email" data-constraints="@Required @Email">
                </div>
              </div>
              <div class="col-md-12">
                <div class="form-wrap">
                  <label class="form-label" for="contact-message">Mensagem:</label>
                  <textarea class="form-input" id="contact-message" name="message" data-constraints="@Required"></textarea>
                </div>
              </div>
            </div>
            <div class="form-button">
              <button class="button button-primary" type="submit">Enviar Mensagem</button>
            </div>
          </form>
